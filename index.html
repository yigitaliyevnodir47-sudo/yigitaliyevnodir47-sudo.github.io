<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Modern Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #fff;
            animation: backgroundAnimation 10s infinite alternate;
            overflow-x: hidden;
        }

        @keyframes backgroundAnimation {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        header {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 4rem;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7);
        }

        .portfolio {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            width: 300px;
            margin: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
            backdrop-filter: blur(10px);
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .card h2 {
            font-size: 1.5rem;
            padding: 1rem;
            text-align: center;
        }

        .card p {
            padding: 0 1rem 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My Portfolio</h1>
    </header>
    <div class="portfolio">
        <div class="card">
            <img src="example1.jpg" alt="Project 1">
            <h2>Project 1</h2>
            <p>Details about project 1.</p>
        </div>
        <div class="card">
            <img src="example2.jpg" alt="Project 2">
            <h2>Project 2</h2>
            <p>Details about project 2.</p>
        </div>
        <div class="card">
            <img src="example3.jpg" alt="Project 3">
            <h2>Project 3</h2>
            <p>Details about project 3.</p>
        </div>
    </div>
    <script>
        // Add any interactive effects or animations here
    </script>
</body>
</html>
